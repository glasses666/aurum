name: Aurum CI

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runner
        run: python -m pip install --upgrade pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Compile scripts
        run: python -m py_compile scripts/*.py

      - name: Smoke generate dashboard and status report
        run: |
          tmp="$(mktemp -d)"
          python scripts/generate_dashboard.py --data-dir "$tmp/paper_duel" --env-file "" --output-dir "$tmp/public"
          python scripts/aurum_status_report.py --data-dir "$tmp/paper_duel" --output "$tmp/report.json" >/dev/null

      - name: Changed-line secret scan
        run: python scripts/changed_line_secret_scan.py --ci

      - name: Whitespace check
        run: git diff --check

      - name: Generated files clean check
        run: |
          status="$(git status --short)"
          if [ -n "$status" ]; then
            echo "$status"
            exit 1
          fi
